<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>YouTube Official Look</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into a correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which will cause the window to load the correct site path and
      // preserve the query string and hash for the single-page app.
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, l.pathname.lastIndexOf('/')) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script>
      // Fallback for simple routing
      window.location.replace("./index.html");
    </script>
  </head>
  <body>
  </body>
</html>
